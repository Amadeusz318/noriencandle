<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montadeus | Kreatywny Montaż</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Font zbliżony do IKEA */
            background-color: #f9f9f9;
            color: #111;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #fff;
            text-align: center;
        }

        header h1 {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .scroll-down {
            position: absolute;
            bottom: 50px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        /* --- SEKCJA INSTRUKCJI (STYL IKEA) --- */
        .ikea-section {
            padding: 100px 20px;
            background: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .ikea-manual {
            max-width: 900px;
            width: 100%;
            border: 4px solid #000;
            padding: 40px;
            background: #fff;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        .ikea-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 4px solid #000;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .ikea-logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .ikea-code {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .ikea-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .ikea-step {
            border: 2px solid #000;
            padding: 20px;
            position: relative;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .step-number {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 2rem;
            font-weight: 900;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Prosty rysunek konturowy (zastępczy dla wektorów) */
        .ikea-illustration {
            font-size: 5rem;
            margin-top: 20px;
            opacity: 0.8;
        }

        /* --- SEKCJA WAŁKA MALARSKIEGO (GSAP) --- */
        .paint-section {
            height: 300vh; /* Duża wysokość, by scrollowanie trwało dłuższą chwilę */
            background-color: #f9f9f9;
            position: relative;
        }

        .paint-container {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #fff;
        }

        /* Ukryty, wyblakły tekst w tle */
        .text-bg {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            color: #f0f0f0; /* Prawie niewidoczny na białym tle */
            white-space: nowrap;
            text-transform: uppercase;
            position: absolute;
            z-index: 1;
        }

        /* Warstwa "farby", która będzie się rozszerzać */
        .paint-reveal {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%; /* Zaczynamy od 0 szerokości */
            background-color: #FF4500; /* Kolor farby (pomarańczowy premium) */
            z-index: 2;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Ten sam tekst, ale wycentrowany identycznie, w białym kolorze */
        .text-fg {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            color: #fff;
            white-space: nowrap;
            text-transform: uppercase;
            position: absolute;
            left: 50vw; /* Środek ekranu */
            transform: translateX(-50%);
        }

        /* Ikona wałka na krawędzi "farby" */
        .roller {
            position: absolute;
            top: 50%;
            left: 0; /* Będzie poruszany przez GSAP */
            transform: translate(-50%, -50%);
            font-size: 5rem;
            z-index: 3;
            /* Można tu wstawić SVG wałka */
        }

        /* Sekcja końcowa */
        .footer-spacer {
            height: 100vh;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>Montadeus</h1>
        <div class="scroll-down">Scrolluj w dół</div>
    </header>

    <section class="ikea-section">
        <div class="ikea-manual">
            <div class="ikea-header">
                <div class="ikea-logo">MONTADEUS</div>
                <div class="ikea-code">AA-2026-1</div>
            </div>
            
            <h2 style="margin-bottom: 30px; text-align: center; text-transform: uppercase;">1. Jak to robimy?</h2>
            
            <div class="ikea-grid">
                <div class="ikea-step">
                    <div class="step-number">1</div>
                    <div class="ikea-illustration">📦</div>
                    <p style="margin-top:20px; font-weight: bold;">Ty zamawiasz paczki</p>
                </div>
                <div class="ikea-step">
                    <div class="step-number">2</div>
                    <div class="ikea-illustration">☕</div>
                    <p style="margin-top:20px; font-weight: bold;">Pijesz kawę</p>
                </div>
                <div class="ikea-step">
                    <div class="step-number">3</div>
                    <div class="ikea-illustration">🔧</div>
                    <p style="margin-top:20px; font-weight: bold;">My składamy wszystko</p>
                </div>
                <div class="ikea-step">
                    <div class="step-number">4</div>
                    <div class="ikea-illustration">✨</div>
                    <p style="margin-top:20px; font-weight: bold;">Gotowe. Brakujących śrubek: 0</p>
                </div>
            </div>
        </div>
    </section>

    <section class="paint-section">
        <div class="paint-container">
            
            <div class="text-bg">Malowanie Wnętrz</div>
            
            <div class="paint-reveal">
                <div class="text-fg">Malowanie Wnętrz</div>
            </div>

            <div class="roller">🖌️</div>
        </div>
    </section>

    <section class="footer-spacer">
        Jesteśmy gotowi do pracy.
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Animacja wałka i rozlewania farby
        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".paint-section",
                start: "top top", // Animacja startuje, gdy sekcja dotknie góry ekranu
                end: "bottom bottom", // Kończy się na dole tej dużej sekcji
                scrub: 1, // '1' daje lekkie opóźnienie, tworząc płynne "maźnięcie"
                pin: false // Pinning załatwiliśmy przez CSS: position sticky
            }
        });

        // 1. Rozciągnij szerokość pomalowanego tła od 0 do 100vw (cały ekran)
        tl.to(".paint-reveal", {
            width: "100vw",
            ease: "none"
        }, 0); // Oznaczenie '0' sprawia, że animacje dzieją się równocześnie

        // 2. Przesuń ikonę wałka równo z krawędzią rozszerzającego się tła
        tl.to(".roller", {
            left: "100vw",
            ease: "none"
        }, 0);
    </script>

</body>
</html>
