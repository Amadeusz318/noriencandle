<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NORIEN | Berlin Urban Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf7; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        .bg-dots { background-image: radial-gradient(#d1d1d1 0.8px, transparent 0.8px); background-size: 40px 40px; }

        /* Styl pasywnych dzielnic */
        .district-passive { fill: transparent; stroke: #e5e5e5; stroke-width: 0.7; transition: 0.3s; }
        .label-passive { font-size: 5px; fill: #1a1a1a; opacity: 0.15; pointer-events: none; text-anchor: middle; letter-spacing: 0.15em; text-transform: uppercase; }

        /* Styl aktywnych dzielnic - stan domyślny (czarne bryły) */
        .district-active { 
            fill: #0d0d0d; 
            stroke-width: 1.2; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: center;
            transform-box: fill-box;
        }
        .label-active { 
            font-size: 6px; 
            font-weight: 600; 
            letter-spacing: 0.25em; 
            fill: #ffffff; 
            opacity: 0.4; 
            pointer-events: none; 
            text-anchor: middle;
            transition: 0.4s;
        }

        /* Hover - efekt "rozświetlenia" i obwoluty */
        .active-group:hover .district-active { transform: scale(1.02); z-index: 50; }
        .active-group:hover .label-active { opacity: 1; transform: translateY(-2px); }

        /* Specyficzne kolory dla hovera (zgodne z Twoim screenem) */
        .group-mitte .district-active { stroke: #b35a2d; }
        .group-mitte:hover .district-active { fill: #f2ede9; stroke-width: 1.5; }
        .group-mitte:hover .label-active { fill: #b35a2d; }

        .group-prenzl .district-active { stroke: #8a7b8e; }
        .group-prenzl:hover .district-active { fill: #f0eff1; stroke-width: 1.5; }
        .group-prenzl:hover .label-active { fill: #8a7b8e; }

        .group-kreuzberg .district-active { stroke: #005f63; }
        .group-kreuzberg:hover .district-active { fill: #ecf3f3; stroke-width: 1.5; }
        .group-kreuzberg:hover .label-active { fill: #005f63; }

        .group-neukolln .district-active { stroke: #631b2b; }
        .group-neukolln:hover .district-active { fill: #f1ebed; stroke-width: 1.5; }
        .group-neukolln:hover .label-active { fill: #631b2b; }
    </style>
</head>
<body class="bg-dots min-h-screen flex items-center justify-center p-8">

    <div class="max-w-[1600px] w-full grid lg:grid-cols-12 gap-20 items-center">
        
        <!-- MAPA SVG -->
        <div class="lg:col-span-8 relative">
            <svg viewBox="0 0 1000 800" class="w-full h-auto overflow-visible">
                
                <!-- PASYWNE TŁO MIASTA (Dopełnienie do 12 dzielnic) -->
                <g id="passive-layer">
                    <path class="district-passive" d="M50,300 L180,250 L280,300 L260,500 L120,580 L40,450 Z" /> <text x="130" y="420" class="label-passive">Spandau</text>
                    <path class="district-passive" d="M280,100 L450,80 L500,180 L450,300 L300,300 L250,200 Z" /> <text x="360" y="190" class="label-passive">Reinickendorf</text>
                    <path class="district-passive" d="M260,500 L350,420 L320,300 L180,250 Z" /> <text x="240" y="380" class="label-passive">Charl.-Wilm.</text>
                    <path class="district-passive" d="M640,320 L780,300 L850,450 L650,530 L600,430 Z" /> <text x="730" y="380" class="label-passive">Lichtenberg</text>
                    <path class="district-passive" d="M650,530 L850,450 L950,550 L900,780 L620,630 L550,550 Z" /> <text x="780" y="620" class="label-passive">Treptow-Köp.</text>
                    <path class="district-passive" d="M350,420 L430,450 L460,530 L430,630 L450,780 L320,720 L260,500 Z" /> <text x="360" y="580" class="label-passive">Temp.-Schön.</text>
                    <path class="district-passive" d="M120,580 L260,500 L320,720 L280,820 L100,780 Z" /> <text x="180" y="680" class="label-passive">Steglitz-Zehl.</text>
                </g>

                <!-- AKTYWNE DZIELNICE (Czarne bryły z hoverem) -->
                <!-- MITTE -->
                <g class="active-group group-mitte">
                    <path class="district-active" d="M320,300 L450,300 L480,420 L430,450 L350,420 Z" />
                    <text x="395" y="375" class="label-active">MITTE</text>
                </g>

                <!-- PRENZLAUER BERG -->
                <g class="active-group group-prenzl">
                    <path class="district-active" d="M450,300 L640,320 L600,430 L480,420 Z" />
                    <text x="545" y="375" class="label-active">PRENZL. BERG</text>
                </g>

                <!-- KREUZBERG -->
                <g class="active-group group-kreuzberg">
                    <path class="district-active" d="M430,450 L480,420 L600,430 L650,530 L550,550 L460,530 Z" />
                    <text x="535" y="500" class="label-active">KREUZBERG</text>
                </g>

                <!-- NEUKÖLLN -->
                <g class="active-group group-neukolln">
                    <path class="district-active" d="M460,530 L550,550 L620,630 L580,820 L450,780 L430,630 Z" />
                    <text x="530" y="680" class="label-active">NEUKÖLLN</text>
                </g>

            </svg>
        </div>

        <!-- SEKCJA TEKSTOWA -->
        <div class="lg:col-span-4 pr-12">
            <div class="mb-12">
                <h1 class="text-[80px] font-thin tracking-tighter leading-[0.85] mb-6">
                    Olfactory <br><span class="italic">Cartography.</span>
                </h1>
                <p class="text-gray-400 font-light text-xl leading-relaxed">
                    Każda dzielnica Berlina to osobna historia. Nasze aktywne edycje (zaznaczone kolorem) to sensoryczne zapisy konkretnych współrzędnych. Wybierz obszar, by poznać szczegóły.
                </p>
            </div>
            
            <div class="flex gap-16 border-t border-gray-100 pt-10">
                <div>
                    <span class="block text-4xl font-extralight tracking-tighter">12</span>
                    <span class="text-[10px] uppercase tracking-[0.3em] opacity-40">Bezirke</span>
                </div>
                <div>
                    <span class="block text-4xl font-extralight tracking-tighter">04</span>
                    <span class="text-[10px] uppercase tracking-[0.3em] opacity-40">Archives</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
