<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NORIEN BERLIN | Map Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf7; color: #1a1a1a; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .bg-dots {
            background-image: radial-gradient(#d1d1d1 0.8px, transparent 0.8px);
            background-size: 32px 32px;
        }

        /* Precyzyjne ścieżki */
        .district-path {
            fill: transparent;
            stroke: #1a1a1a;
            stroke-width: 1;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            transform-origin: center;
            transform-box: fill-box;
        }

        /* Outline miasta - Realna skala */
        .berlin-border {
            fill: none;
            stroke: #e5e5e5;
            stroke-width: 1.5;
            stroke-dasharray: 4 4; /* Delikatna przerywana linia dla technicznego looku */
        }

        /* Interakcja i kolory Norien */
        .group-mitte:hover .district-path { fill: #b35a2d; stroke: #b35a2d; }
        .group-prenzl:hover .district-path { fill: #8a7b8e; stroke: #8a7b8e; }
        .group-kreuzberg:hover .district-path { fill: #005f63; stroke: #005f63; }
        .group-neukolln:hover .district-path { fill: #631b2b; stroke: #631b2b; }

        .district-group:hover .district-path {
            transform: translateY(-15px) scale(1.03);
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.1));
        }

        .label {
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.3em;
            fill: #1a1a1a;
            opacity: 0; /* Ukryte, pojawiają się na hover */
            transition: 0.4s;
            pointer-events: none;
            text-anchor: middle;
        }

        .district-group:hover .label { opacity: 1; fill: #fff; transform: translateY(-15px); }
    </style>
</head>
<body class="bg-dots">

    <section class="min-h-screen flex items-center justify-center py-20 px-6">
        <div class="max-w-7xl w-full grid lg:grid-cols-2 gap-16 items-center">
            
            <!-- MAPA ZGODNA ZE SKALĄ -->
            <div class="relative w-full aspect-square flex items-center justify-center">
                <svg viewBox="0 0 1000 1000" class="w-full h-full overflow-visible">
                    
                    <!-- REALISTYCZNA GRANICA BERLINA (Outline miasta) -->
                    <path class="berlin-border" d="M350,150 L500,100 L650,130 L850,250 L920,450 L850,750 L650,880 L400,920 L150,850 L50,600 L80,350 L200,200 Z" />

                    <!-- SKUPISKO DZIELNIC (Centralne) -->
                    <!-- MITTE -->
                    <g class="district-group group-mitte">
                        <path class="district-path" d="M420,410 L510,390 L560,450 L530,530 L440,540 L410,480 Z" />
                        <text x="475" y="475" class="label">MITTE</text>
                    </g>

                    <!-- PRENZLAUER BERG -->
                    <g class="district-group group-prenzl">
                        <path class="district-path" d="M510,390 L580,310 L680,360 L630,470 L560,450 Z" />
                        <text x="600" y="400" class="label">PRENZL. BERG</text>
                    </g>

                    <!-- KREUZBERG -->
                    <g class="district-group group-kreuzberg">
                        <path class="district-path" d="M440,540 L530,530 L630,470 L680,550 L610,630 L490,620 Z" />
                        <text x="560" y="560" class="label">KREUZBERG</text>
                    </g>

                    <!-- NEUKÖLLN -->
                    <g class="district-group group-neukolln">
                        <path class="district-path" d="M490,620 L610,630 L680,680 L640,850 L500,820 L460,740 Z" />
                        <text x="570" y="730" class="label">NEUKÖLLN</text>
                    </g>
                </svg>
            </div>

            <!-- TREŚĆ -->
            <div class="space-y-12">
                <div class="space-y-6">
                    <p class="text-[10px] tracking-[0.5em] uppercase opacity-40">The Urban Guide</p>
                    <h2 class="text-6xl font-extralight tracking-tighter leading-[0.95]">Twoja dzielnica.<br><span class="italic">Twój zapach.</span></h2>
                    <p class="text-gray-500 font-light text-lg leading-relaxed max-w-md">
                        Kształty odzwierciedlają realne granice topograficzne Berlina. Wybierz obszar, aby odkryć jego sensoryczny zapis. Każdy kolor odpowiada unikalnej identyfikacji wizualnej naszych edycji.
                    </p>
                </div>
                
                <div class="grid grid-cols-2 gap-10 border-t border-gray-100 pt-10">
                    <div>
                        <span class="block text-4xl font-extralight">12</span>
                        <span class="text-[9px] uppercase tracking-widest opacity-40">Dzielnic Berlina</span>
                    </div>
                    <div>
                        <span class="block text-4xl font-extralight">160g</span>
                        <span class="text-[9px] uppercase tracking-widest opacity-40">Wosk roślinny</span>
                    </div>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
