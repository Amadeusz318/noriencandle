<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORIEN BERLIN | Premium Olfactory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { background-color: #fcfaf7; overflow-x: hidden; font-family: 'Inter', sans-serif; }

        /* KINOWY EFEKT SZKŁA */
        .glass-vessel {
            background: linear-gradient(105deg, #1a0f0a 0%, #3d2217 25%, #5c3426 50%, #3d2217 75%, #1a0f0a 100%);
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.8),
                inset 20px 0 40px rgba(255,255,255,0.05),
                0 30px 60px rgba(0,0,0,0.4);
            position: relative;
            z-index: 10;
        }

        /* WARSTWA ODBLASKU (Nad woskiem) */
        .glass-reflection {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, 
                transparent 10%, 
                rgba(255,255,255,0.1) 20%, 
                rgba(255,255,255,0.2) 25%, 
                transparent 30%,
                transparent 70%,
                rgba(255,255,255,0.1) 85%,
                transparent 100%);
            pointer-events: none;
            z-index: 30; /* Bardzo ważne - nad woskiem i etykietą */
        }

        /* WOSK (Wewnątrz słoika) */
        #wax-pour {
            background: #f4e9d9;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.05);
            filter: blur(0.5px);
            z-index: 15;
            position: absolute;
            bottom: 15px; /* Nad dnem słoika */
            left: 50%;
            transform: translateX(-50%);
        }

        /* BIAŁE PUDEŁKO */
        .premium-box {
            background: #ffffff;
            box-shadow: 0 40px 100px rgba(0,0,0,0.07);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .label-text {
            color: white;
            mix-blend-mode: normal;
            z-index: 25;
        }
    </style>
</head>
<body>

    <!-- SEKCYJNY PRELOADER DLA PŁYNNOŚCI -->
    <section class="h-screen flex items-center justify-center">
        <p class="text-[10px] tracking-widest uppercase opacity-40">Scrolluj, aby stworzyć</p>
    </section>

    <!-- SCROLLYTELLING SECTION -->
    <section id="story-section" class="relative w-full h-[500vh]">
        <div class="sticky top-0 w-full h-screen flex items-center justify-center overflow-hidden">
            
            <div class="relative w-[320px] h-[480px] flex items-center justify-center">
                
                <!-- 1. PUDEŁKO (Finał) -->
                <div id="story-box" class="premium-box absolute w-[310px] h-[410px] opacity-0 scale-90 z-50 flex flex-col items-center justify-center p-12">
                    <p class="text-[8px] tracking-[0.4em] uppercase mb-10 opacity-60">Norien Berlin</p>
                    <h2 class="text-4xl tracking-[0.2em] font-extralight mb-10">MITTE</h2>
                    <div class="w-10 h-[1px] bg-black/10 mb-8"></div>
                    <p class="text-[8px] tracking-widest uppercase opacity-40">Handcrafted in Berlin</p>
                </div>

                <!-- 2. SŁOIK (Konstrukcja warstwowa) -->
                <div id="story-jar" class="glass-vessel w-[280px] h-[340px] rounded-b-[20px] rounded-t-[5px] overflow-hidden">
                    
                    <!-- Odblaski szkła (Zawsze na górze) -->
                    <div class="glass-reflection"></div>
                    
                    <!-- Przezroczysta etykieta -->
                    <div id="story-label" class="label-text absolute inset-0 flex flex-col items-center justify-center opacity-0 py-10">
                        <p class="text-[7px] tracking-[0.3em] font-semibold uppercase mb-6">Norien Berlin</p>
                        <h3 class="text-5xl tracking-[0.1em] font-light mb-8">MITTE</h3>
                        <div class="w-full px-10">
                            <div class="w-16 h-[1.5px] bg-[#b88b4a] mb-6"></div>
                            <div class="text-[10px] tracking-[0.2em] font-medium leading-relaxed uppercase">
                                Lavender<br>Myrrh<br>Suede
                            </div>
                            <div class="mt-8 text-[9px] opacity-80">160 G</div>
                        </div>
                    </div>

                    <!-- WOSK (Dynamiczny) -->
                    <div id="wax-pour" class="w-[0%] h-[0%] rounded-t-[100%]"></div>

                    <!-- Grube dno słoika -->
                    <div class="absolute bottom-0 w-full h-[15px] bg-black/40 z-20"></div>
                </div>

                <!-- 3. STRUMIEŃ (Nalewanie) -->
                <div id="pour-stream" class="absolute top-0 left-1/2 -translate-x-1/2 w-[4px] h-0 bg-[#f4e9d9] z-0 shadow-[0_0_15px_rgba(244,233,217,0.5)]"></div>

                <!-- 4. WIECZKO -->
                <div id="story-lid" class="absolute top-[60px] w-[290px] h-[15px] bg-[#111] rounded-t-sm z-40 opacity-0 -translate-y-20 shadow-2xl"></div>

                <!-- 5. KNOT -->
                <div id="story-wick" class="absolute top-[165px] left-1/2 -translate-x-1/2 w-[2px] h-[15px] bg-black opacity-0 z-30"></div>

            </div>
        </div>
    </section>

    <section class="h-screen flex items-center justify-center">
        <p class="text-[10px] tracking-widest uppercase opacity-40">Koniec procesu</p>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Lenis - Płynny scroll
        const lenis = new Lenis();
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time)=>{ lenis.raf(time * 1000) });

        // GŁÓWNA OŚ CZASU (200+ klatek płynności)
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#story-section",
                start: "top top",
                end: "+=4000", // Zwiększony dystans dla super płynności
                scrub: 1,
                pin: true
            }
        });

        tl
        // 1. Nalewanie (Strumień uderza w dno)
        .to("#pour-stream", { height: "70%", duration: 1 })
        .to("#wax-pour", { width: "100%", height: "5%", ease: "power2.out", duration: 0.5 }, "-=0.2")
        
        // 2. Wypełnianie (Strumień znika, wosk rośnie)
        .to("#pour-stream", { opacity: 0, duration: 0.2 })
        .to("#wax-pour", { 
            height: "75%", 
            borderRadius: "0%", 
            duration: 3, 
            ease: "none" 
        })

        // 3. Detale (Etykieta i knot)
        .to("#story-label", { opacity: 1, y: -10, duration: 1.5 })
        .to("#story-wick", { opacity: 1, y: 10, duration: 0.5 }, "-=1")

        // 4. Zamknięcie
        .to("#story-lid", { opacity: 1, y: 10, duration: 1 })
        
        // 5. Pakowanie (Słoik wchodzi do pudełka)
        .to("#story-jar", { scale: 0.8, opacity: 0, duration: 1.5, delay: 0.5 })
        .to("#story-lid", { scale: 0.8, opacity: 0, duration: 1.5 }, "-=1.5")
        .to("#story-box", { opacity: 1, scale: 1, duration: 2 }, "-=1");

    </script>
</body>
</html>
