<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NORIEN BERLIN | Full Urban Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf7; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        .bg-dots { background-image: radial-gradient(#d1d1d1 0.8px, transparent 0.8px); background-size: 32px 32px; }

        /* Mapa - Stylizacja ogólna */
        .district { fill: transparent; stroke: #e0e0e0; stroke-width: 0.8; transition: all 0.5s ease; }
        .label-passive { font-size: 6px; fill: #1a1a1a; opacity: 0.2; pointer-events: none; text-anchor: middle; letter-spacing: 0.1em; text-transform: uppercase; }

        /* Twoje 4 Dzielnice - Aktywne */
        .active-path { stroke-width: 1.5; cursor: pointer; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .label-active { font-size: 7px; font-weight: 600; letter-spacing: 0.2em; opacity: 0.6; transition: 0.4s; }

        /* Kolorowe obwoluty (stroke) */
        .mitte-stroke { stroke: #b35a2d; }
        .prenzl-stroke { stroke: #8a7b8e; }
        .kreuz-stroke { stroke: #005f63; }
        .neukolln-stroke { stroke: #631b2b; }

        /* Hover efekty */
        .active-group:hover .active-path { transform: translateY(-10px); filter: drop-shadow(0 15px 10px rgba(0,0,0,0.1)); }
        .active-group:hover .label-active { opacity: 1; transform: translateY(-10px); }
        
        .active-group[data-id="mitte"]:hover .active-path { fill: rgba(179, 90, 45, 0.15); }
        .active-group[data-id="prenzl"]:hover .active-path { fill: rgba(138, 123, 142, 0.15); }
        .active-group[data-id="kreuz"]:hover .active-path { fill: rgba(0, 95, 99, 0.15); }
        .active-group[data-id="neukolln"]:hover .active-path { fill: rgba(99, 27, 43, 0.15); }

        /* Popup */
        #product-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; width: 340px; background: white; border-radius: 2px;
        }
        #product-popup.visible { display: block; animation: pop 0.4s ease-out; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(252, 250, 247, 0.8); backdrop-filter: blur(5px); z-index: 90; }
        @keyframes pop { from { opacity: 0; transform: translate(-50%, -45%) scale(0.95); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body class="bg-dots min-h-screen flex items-center justify-center p-6">

    <div class="max-w-7xl w-full grid lg:grid-cols-12 gap-12 items-center">
        
        <!-- MAPA SVG (Zgodna z mapą administracyjną Berlina) -->
        <div class="lg:col-span-7 relative">
            <svg viewBox="0 0 1000 900" class="w-full h-auto overflow-visible">
                
                <!-- 1. SPANDAU -->
                <path class="district" d="M50,350 L180,280 L280,320 L260,520 L120,600 L40,480 Z" />
                <text x="140" y="450" class="label-passive">Spandau</text>

                <!-- 2. REINICKENDORF -->
                <path class="district" d="M280,120 L450,100 L500,200 L450,320 L300,320 L250,220 Z" />
                <text x="360" y="210" class="label-passive">Reinickendorf</text>

                <!-- 3. PANKOW (Tło dla Prenzlauer Berg) -->
                <path class="district" d="M450,100 L620,130 L680,250 L640,350 L450,320 Z" />
                <text x="560" y="210" class="label-passive">Pankow</text>

                <!-- 4. CHARLOTTENBURG-WILMERSDORF -->
                <path class="district" d="M260,520 L350,450 L320,320 L280,320 L180,280 L260,520 Z" />
                <text x="250" y="420" class="label-passive">Charlottenburg</text>

                <!-- 5. MITTE (AKTYWNA) -->
                <g class="active-group" data-id="mitte" onclick="showPopup('mitte')">
                    <path class="active-path mitte-stroke" d="M320,320 L450,320 L480,420 L430,480 L350,450 Z" />
                    <text x="400" y="405" class="label-active !fill-[#b35a2d]">MITTE</text>
                </g>

                <!-- 6. PRENZLAUER BERG (AKTYWNA - CZĘŚĆ PANKOW) -->
                <g class="active-group" data-id="prenzl" onclick="showPopup('prenzl')">
                    <path class="active-path prenzl-stroke" d="M450,320 L640,350 L600,450 L480,420 Z" />
                    <text x="545" y="395" class="label-active !fill-[#8a7b8e]">PRENZL. BERG</text>
                </g>

                <!-- 7. FRIEDRICHSHAIN-KREUZBERG (AKTYWNA) -->
                <g class="active-group" data-id="kreuz" onclick="showPopup('kreuz')">
                    <path class="active-path kreuz-stroke" d="M430,480 L480,420 L600,450 L650,550 L550,580 L460,550 Z" />
                    <text x="530" y="515" class="label-active !fill-[#005f63]">KREUZBERG</text>
                </g>

                <!-- 8. NEUKÖLLN (AKTYWNA) -->
                <g class="active-group" data-id="neukolln" onclick="showPopup('neukolln')">
                    <path class="active-path neukolln-stroke" d="M460,550 L550,580 L620,650 L580,850 L450,800 L430,650 Z" />
                    <text x="530" y="710" class="label-active !fill-[#631b2b]">NEUKÖLLN</text>
                </g>

                <!-- 9. LICHTENBERG -->
                <path class="district" d="M640,350 L750,320 L820,450 L650,550 L600,450 Z" />
                <text x="710" y="410" class="label-passive">Lichtenberg</text>

                <!-- 10. TREPTOW-KÖPENICK -->
                <path class="district" d="M650,550 L820,450 L950,550 L900,800 L620,650 L550,580 Z" />
                <text x="780" y="650" class="label-passive">Treptow-Köpenick</text>

                <!-- 11. TEMPELHOF-SCHÖNEBERG -->
                <path class="district" d="M350,450 L430,480 L460,550 L430,650 L450,800 L320,750 L260,520 Z" />
                <text x="360" y="620" class="label-passive">Tempelhof</text>

                <!-- 12. STEGLITZ-ZEHLENDORF -->
                <path class="district" d="M120,600 L260,520 L320,750 L280,850 L100,800 Z" />
                <text x="190" y="720" class="label-passive">Steglitz</text>

            </svg>
        </div>

        <!-- TEKST BOCZNY -->
        <div class="lg:col-span-5 space-y-8 pl-10">
            <div class="space-y-4">
                <p class="text-[10px] tracking-[0.5em] uppercase opacity-40 font-bold">The Urban Guide</p>
                <h1 class="text-6xl font-extralight tracking-tighter leading-[0.9]">Berlin <br><span class="italic">Cartography.</span></h1>
            </div>
            <p class="text-gray-500 font-light text-lg leading-relaxed">
                Nasze świece to sensoryczne archiwum miasta. Najedź na kolorowe okręgi, aby odkryć zapisy konkretnych dzielnic.
            </p>
            <div class="grid grid-cols-2 gap-8 pt-10 border-t border-gray-200">
                <div><span class="block text-4xl font-extralight">12</span><span class="text-[9px] uppercase tracking-widest opacity-40">Bezirke</span></div>
                <div><span class="block text-4xl font-extralight">04</span><span class="text-[9px] uppercase tracking-widest opacity-40">Archives</span></div>
            </div>
        </div>
    </div>

    <!-- OVERLAY & POPUP -->
    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div id="product-popup">
        <div id="popup-color-bar" class="h-2 w-full"></div>
        <div class="p-10 space-y-6">
            <h3 id="popup-title" class="text-3xl font-light tracking-tighter uppercase"></h3>
            <p id="popup-desc" class="text-sm font-light leading-relaxed text-gray-500"></p>
            <div class="flex justify-between items-center pt-6 border-t border-gray-100">
                <span class="text-xl font-light">45.00 EUR</span>
                <button class="bg-black text-white text-[10px] px-8 py-4 tracking-[0.2em] uppercase hover:bg-gray-800 transition">Add to Archive</button>
            </div>
        </div>
    </div>

    <script>
        const products = {
            mitte: { title: '01 Mitte', color: '#b35a2d', desc: 'Miedź, szafran i surowy beton. Zapach serca Berlina, gdzie historia spotyka brutalistyczny modernizm.' },
            prenzl: { title: '02 Prenzlauer Berg', color: '#8a7b8e', desc: 'Poranna mgła nad Kollwitzplatz. Lawenda, grafit i nuty starej kamienicy.' },
            kreuz: { title: '03 Kreuzberg', color: '#005f63', desc: 'Noc nad kanałem. Sól morska, czarna herbata i zapach wolności.' },
            neukolln: { title: '36 Neukölln', color: '#631b2b', desc: 'Głęboki burgund. Przyprawy z targu, dymny oud i wielokulturowa energia ulicy.' }
        };

        function showPopup(id) {
            const p = products[id];
            document.getElementById('popup-title').innerText = p.title;
            document.getElementById('popup-desc').innerText = p.desc;
            document.getElementById('popup-color-bar').style.backgroundColor = p.color;
            document.getElementById('product-popup').classList.add('visible');
            document.getElementById('overlay').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('product-popup').classList.remove('visible');
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
