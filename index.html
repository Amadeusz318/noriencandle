<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORIEN BERLIN | Olfactory Archives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { norien: { gold: '#b88b4a', dark: '#0f0f0f', canvas: '#EBE9E4' } },
                    letterSpacing: { 'ultra': '0.8em', 'micro': '0.2em' }
                } 
            } 
        }
    </script>
</head>
<body class="antialiased">

    <div id="preloader">
        <div id="loader-perc" class="text-4xl font-thin tracking-widest text-black">0%</div>
    </div>

    <div class="custom-cursor hidden md:block" id="custom-cursor"></div>

    <nav id="main-nav" class="nav-top px-6 md:px-10 py-5 flex justify-between items-center">
        <a href="index.html" class="flex flex-col items-center justify-center pt-1 magnetic text-white">
            <span style="font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 1.3rem; letter-spacing: 0.435em; line-height: 1; margin-right: -0.435em; color: currentColor;">NORIEN</span>
            <span style="font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 10px; letter-spacing: 0.23em; margin-top: 0.5rem; margin-right: -0.23em; color: currentColor; opacity: 0.7;">BERLIN</span>
        </a>
        <div class="hidden lg:flex gap-10 text-[11px] tracking-widest uppercase font-light ml-8">
            <div class="magnetic"><a href="sklep.html" class="hover:text-norien-gold transition-colors duration-300">Sklep</a></div>
            <div class="magnetic"><a href="o-nas.html" class="hover:text-norien-gold transition-colors duration-300">O nas</a></div>
            <div class="magnetic"><a href="kontakt.html" class="hover:text-norien-gold transition-colors duration-300">Kontakt</a></div>
        </div>
        <div class="flex items-center gap-6 md:gap-10">
            <div class="hidden md:flex gap-4 text-[10px] tracking-widest uppercase">
                <button onclick="changeLang('pl')" class="lang-btn active lang-pl">PL</button>
                <button onclick="changeLang('en')" class="lang-btn lang-en">EN</button>
            </div>
            <div class="magnetic"><div id="nav-cart" class="text-[10px] md:text-[11px] tracking-widest border-b pb-1 uppercase hover:text-norien-gold transition-colors duration-300 cursor-pointer" onclick="openCart()">KOSZYK (0)</div></div>
        </div>
    </nav>

    <section id="hero" class="observe-section h-screen min-h-[100dvh] w-full flex flex-col justify-center items-center text-center px-6 relative overflow-hidden bg-black text-white">
        <div class="absolute inset-0 w-full h-full z-0">
            <img src="assets/images/hero-leipzig.png" alt="Norien Berlin" class="w-full h-full object-cover opacity-80 scale-100">
        </div>
        
        <div class="absolute inset-0 z-0 bg-gradient-to-b from-black/30 via-transparent to-black/80"></div>

        <div class="relative z-10 pt-20">
            <p class="text-[10px] md:text-[11px] tracking-ultra uppercase mb-8 opacity-70 text-reveal delay-1">Olfactory Archives</p>
            <h1 class="text-5xl md:text-7xl lg:text-8xl font-thin tracking-tighter mb-10 leading-tight">
                <span class="block text-reveal delay-1">Prawdziwy Berlin.</span>
                <span class="block text-reveal delay-2 italic text-[#b88b4a]">Zamknięty w szkle.</span>
            </h1>
            <p class="max-w-xl mx-auto text-base md:text-lg font-light leading-relaxed opacity-80 text-reveal delay-3">Tworzymy zapachy, które oddają charakter berlińskich dzielnic.</p>
        </div>
        
        <div class="magnetic absolute bottom-12 left-1/2 -translate-x-1/2 text-reveal delay-4 z-10 text-white">
            <a href="#map-explore" class="text-[10px] tracking-widest uppercase animate-bounce italic opacity-60 hover:text-norien-gold transition-colors">Przewiń by odkryć</a>
        </div>

    <section id="map-explore" class="observe-section min-h-screen w-full flex flex-col justify-center bg-transparent py-32 relative overflow-hidden">
        <div class="container mx-auto px-6 grid lg:grid-cols-12 gap-16 items-center">
            <div class="lg:col-span-8 flex justify-center">
                <svg id="map-svg" viewBox="0 0 1000 850" class="w-full max-h-[70vh] overflow-visible transform scale-110 md:scale-100">
                    </svg>
            </div>
            <div class="lg:col-span-4 space-y-8 text-reveal">
                <h2 class="text-[10px] tracking-ultra uppercase opacity-40 font-bold text-black">The Urban Guide</h2>
                <h3 class="text-4xl lg:text-5xl font-extralight leading-tight uppercase text-black">Dzielnica. <br> Zapach. <br> Archiwum.</h3>
            </div>
        </div>
    </section>
