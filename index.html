<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NORIEN | Berlin Urban Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf7; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        .bg-dots { background-image: radial-gradient(#d1d1d1 0.8px, transparent 0.8px); background-size: 40px 40px; }

        /* Stylizacja pasywnych dzielnic (tło miasta) */
        .dist-passive { fill: none; stroke: #e5e5e5; stroke-width: 0.8; }
        .label-passive { font-size: 5px; fill: #d1d1d1; text-anchor: middle; letter-spacing: 0.1em; pointer-events: none; }

        /* Aktywne bloki - Stan IDLE (Czarny) */
        .dist-active { 
            fill: #0d0d0d; 
            stroke-width: 2; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
            transform-box: fill-box;
        }
        .label-active { 
            font-size: 6px; font-weight: 600; letter-spacing: 0.2em; fill: #ffffff; 
            text-anchor: middle; pointer-events: none; transition: 0.3s;
        }

        /* Hover - Mocny, nasycony kolor (bez przezroczystości) */
        .group-mitte:hover .dist-active { fill: #b35a2d; stroke: #b35a2d; transform: scale(1.03); }
        .group-prenzl:hover .dist-active { fill: #8a7b8e; stroke: #8a7b8e; transform: scale(1.03); }
        .group-kreuzberg:hover .dist-active { fill: #005f63; stroke: #005f63; transform: scale(1.03); }
        .group-neukolln:hover .dist-active { fill: #631b2b; stroke: #631b2b; transform: scale(1.03); }

        .active-group:hover .label-active { transform: scale(1.1); }

        /* Kafelek Popup */
        #popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; width: 400px; background: white; border-radius: 0; box-shadow: 0 40px 100px rgba(0,0,0,0.15);
        }
        #popup.visible { display: block; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(252, 250, 247, 0.9); z-index: 90; backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-dots min-h-screen flex items-center justify-center p-10">

    <div class="max-w-[1600px] w-full grid lg:grid-cols-12 gap-16 items-center">
        
        <!-- MAPA SVG (12 Dzielnic) -->
        <div class="lg:col-span-8">
            <svg viewBox="0 0 1000 800" class="w-full h-auto overflow-visible">
                
                <!-- PASYWNE (Dopełnienie skali miasta) -->
                <g id="city-tissue">
                    <path class="dist-passive" d="M100,300 L250,250 L350,320 L300,500 L150,550 Z" /> <text x="210" y="410" class="label-passive">Spandau</text>
                    <path class="dist-passive" d="M300,80 L480,100 L500,200 L450,320 L320,320 Z" /> <text x="390" y="200" class="label-passive">Reinickendorf</text>
                    <path class="dist-passive" d="M350,420 L450,450 L480,550 L420,780 L300,720 L250,500 Z" /> <text x="360" y="600" class="label-passive">Temp.-Schön.</text>
                    <path class="dist-passive" d="M650,320 L800,300 L880,450 L680,550 L620,430 Z" /> <text x="740" y="390" class="label-passive">Lichtenberg</text>
                    <path class="dist-passive" d="M680,550 L880,450 L950,550 L900,780 L650,650 L580,580 Z" /> <text x="790" y="650" class="label-passive">Treptow-Köp.</text>
                </g>

                <!-- TWOJE 4 PRODUKTY (Mocna Czerń -> Mocny Kolor) -->
                <!-- Mitte -->
                <g class="active-group group-mitte" onclick="openPopup('mitte')">
                    <path class="dist-active" d="M320,320 L450,320 L500,420 L430,450 L350,420 Z" />
                    <text x="410" y="380" class="label-active">MITTE</text>
                </g>

                <!-- Prenzlauer Berg -->
                <g class="active-group group-prenzl" onclick="openPopup('prenzl')">
                    <path class="dist-active" d="M450,320 L650,320 L620,430 L500,420 Z" />
                    <text x="545" y="380" class="label-active">PRENZL. BERG</text>
                </g>

                <!-- Kreuzberg -->
                <g class="active-group group-kreuzberg" onclick="openPopup('kreuz')">
                    <path class="dist-active" d="M430,450 L500,420 L620,430 L680,550 L580,580 L480,550 Z" />
                    <text x="550" y="505" class="label-active">KREUZBERG</text>
                </g>

                <!-- Neukölln -->
                <g class="active-group group-neukolln" onclick="openPopup('neukolln')">
                    <path class="dist-active" d="M480,550 L580,580 L650,650 L600,850 L450,800 L420,780 L480,650 Z" />
                    <text x="540" y="720" class="label-active">NEUKÖLLN</text>
                </g>

            </svg>
        </div>

        <!-- TREŚĆ -->
        <div class="lg:col-span-4 pl-10 space-y-10">
            <header class="space-y-4">
                <p class="text-[10px] tracking-[0.5em] uppercase opacity-40 font-bold">The Urban Guide</p>
                <h1 class="text-7xl font-extralight tracking-tighter leading-none">Olfactory<br><span class="italic">Cartography.</span></h1>
            </header>
            <p class="text-gray-400 font-light text-xl leading-relaxed">
                Każdy blok na mapie to realna tkanka Berlina. Aktywne obszary to nasze archiwalne zapisy zapachowe.
            </p>
            <div class="grid grid-cols-2 gap-10 border-t border-gray-200 pt-10">
                <div><span class="block text-4xl font-extralight">12</span><span class="text-[9px] uppercase tracking-widest opacity-40">Bezirke</span></div>
                <div><span class="block text-4xl font-extralight">04</span><span class="text-[9px] uppercase tracking-widest opacity-40">Archives</span></div>
            </div>
        </div>
    </div>

    <!-- POPUP KAFELEK -->
    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div id="popup">
        <div id="p-header" class="h-64 w-full flex items-center justify-center text-white">
            <h2 id="p-title" class="text-4xl font-light tracking-widest uppercase">Mitte</h2>
        </div>
        <div class="p-12 space-y-8">
            <p id="p-desc" class="text-gray-500 font-light leading-relaxed"></p>
            <div class="flex justify-between items-center border-t border-gray-100 pt-10">
                <span class="text-2xl font-light">45.00 EUR</span>
                <button class="bg-black text-white text-[10px] px-10 py-5 tracking-[0.2em] uppercase hover:bg-zinc-800 transition">Do Koszyka</button>
            </div>
        </div>
    </div>

    <script>
        const data = {
            mitte: { title: '01 Mitte', color: '#b35a2d', desc: 'Miedź, beton i szafran. Esencja centrum miasta zamknięta w wosku.' },
            prenzl: { title: '02 Prenzlauer Berg', color: '#8a7b8e', desc: 'Lawenda i grafit. Poranek na Kollwitzplatz w archiwum zapachu.' },
            kreuz: { title: '03 Kreuzberg', color: '#005f63', desc: 'Sól morska i czarna herbata. Noc nad kanałem Landwehr.' },
            neukolln: { title: '36 Neukölln', color: '#631b2b', desc: 'Dymny oud i przyprawy. Wielokulturowe serce Berlina.' }
        };

        function openPopup(id) {
            const p = data[id];
            document.getElementById('p-title').innerText = p.title;
            document.getElementById('p-desc').innerText = p.desc;
            document.getElementById('p-header').style.backgroundColor = p.color;
            document.getElementById('popup').classList.add('visible');
            document.getElementById('overlay').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('popup').classList.remove('visible');
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
