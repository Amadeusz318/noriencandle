<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NORIEN BERLIN | Real Map Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf7; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        
        .bg-dots {
            background-image: radial-gradient(#d1d1d1 0.8px, transparent 0.8px);
            background-size: 32px 32px;
        }

        .district-path {
            fill: transparent;
            stroke: #1a1a1a;
            stroke-width: 1.1;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            transform-origin: center;
            transform-box: fill-box;
        }

        /* Outline Berlina - Realny kształt "głowy niedźwiedzia" */
        .berlin-outline {
            fill: none;
            stroke: #e8e8e8;
            stroke-width: 1.5;
        }

        /* Kolory zgodne z archiwum Norien */
        .group-mitte:hover .district-path { fill: #b35a2d; stroke: #b35a2d; }
        .group-prenzl:hover .district-path { fill: #8a7b8e; stroke: #8a7b8e; }
        .group-kreuzberg:hover .district-path { fill: #005f63; stroke: #005f63; }
        .group-neukolln:hover .district-path { fill: #631b2b; stroke: #631b2b; }

        .district-group:hover .district-path {
            transform: translateY(-12px) scale(1.02);
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.1));
        }

        .label {
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.3em;
            fill: #1a1a1a;
            opacity: 0.3;
            transition: 0.4s;
            pointer-events: none;
            text-anchor: middle;
        }

        .district-group:hover .label { opacity: 1; fill: #fff; transform: translateY(-12px); }
    </style>
</head>
<body class="bg-dots min-h-screen flex items-center">

    <div class="container mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
        
        <!-- MAPA SVG (Zgodna z mapą administracyjną) -->
        <div class="relative w-full aspect-square flex items-center justify-center">
            <svg viewBox="0 0 800 800" class="w-full h-full overflow-visible">
                
                <!-- GRANICA MIASTA (Realny kontur Berlina) -->
                <path class="berlin-outline" d="M320,120 C380,100 450,110 520,130 L650,210 L750,380 L680,680 L450,780 L200,720 L80,550 L120,300 L220,180 Z" />

                <!-- PRENZLAUER BERG (Północny wschód Mitte) -->
                <g class="district-group group-prenzl">
                    <path class="district-path" d="M420,290 L520,240 L580,310 L550,420 L445,410 Z" />
                    <text x="510" y="340" class="label">PRENZL. BERG</text>
                </g>

                <!-- MITTE (Serce) -->
                <g class="district-group group-mitte">
                    <path class="district-path" d="M310,310 C340,290 380,280 420,290 L445,410 L390,460 L310,430 L280,370 Z" />
                    <text x="360" y="380" class="label">MITTE</text>
                </g>

                <!-- KREUZBERG (Południe Mitte) -->
                <g class="district-group group-kreuzberg">
                    <path class="district-path" d="M390,460 L445,410 L550,420 L580,530 L480,560 L400,540 Z" />
                    <text x="475" y="495" class="label">KREUZBERG</text>
                </g>

                <!-- NEUKÖLLN (Wąski pas na południe) -->
                <g class="district-group group-neukolln">
                    <path class="district-path" d="M480,560 L580,530 L620,620 L560,780 L460,720 L440,640 Z" />
                    <text x="535" y="660" class="label">NEUKÖLLN</text>
                </g>

            </svg>
        </div>

        <!-- TEKST -->
        <div class="max-w-lg">
            <h4 class="text-[10px] tracking-[0.5em] uppercase opacity-40 mb-4 font-bold">The Urban Guide</h4>
            <h2 class="text-6xl font-extralight tracking-tighter mb-8">Twoja dzielnica.<br>Twój zapach.</h2>
            <p class="text-gray-500 font-light text-lg leading-relaxed mb-10">
                Archiwizujemy Berlin w formie zapachu. Każdy kształt na mapie to realne granice administracyjne dzielnic, które stały się inspiracją dla naszych kolekcji.
            </p>
            <div class="flex gap-16 border-t border-gray-100 pt-10">
                <div>
                    <span class="block text-3xl font-extralight">12</span>
                    <span class="text-[9px] uppercase tracking-widest opacity-40">Okręgów</span>
                </div>
                <div>
                    <span class="block text-3xl font-extralight">160g</span>
                    <span class="text-[9px] uppercase tracking-widest opacity-40">Handmade</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
