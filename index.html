<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ogienek | Premium Redesign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    } 
                } 
            } 
        }
    </script>
</head>
<body class="bg-[#111111] text-white antialiased min-h-screen">

    <header class="w-full py-10 px-8 flex justify-between items-center border-b border-white/10">
        <div class="text-3xl font-serif tracking-wide">ogienek.</div>
        <div class="space-y-1.5 cursor-pointer hover:opacity-70 transition">
            <div class="w-6 h-px bg-white"></div>
            <div class="w-6 h-px bg-white"></div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-6 py-20">
        
        <div class="flex flex-col items-center mb-20 space-y-12">
            <h1 class="text-sm tracking-[0.3em] uppercase text-gray-400 font-light">Kolekcja</h1>
            
            <div class="flex gap-10 text-xs tracking-widest uppercase font-light">
                <a href="#" class="text-white border-b border-white pb-1">Wszystkie</a>
                <a href="#" class="text-gray-500 hover:text-white transition">Świece rzepakowe</a>
                <a href="#" class="text-gray-500 hover:text-white transition">Akcesoria</a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-16">
            
            <a href="#" class="group block">
                <div class="aspect-[4/5] bg-[#1a1a1a] rounded-xl overflow-hidden mb-6 relative">
                    <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59?q=80&w=800&auto=format&fit=crop" alt="Sauna" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000 opacity-90 group-hover:opacity-100">
                </div>
                <div class="text-center">
                    <h3 class="font-serif text-2xl mb-2">Sauna</h3>
                    <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-4">Drzewo cedrowe / Eukaliptus / Dym</p>
                    <p class="text-sm font-light">120 PLN</p>
                </div>
            </a>

            <a href="#" class="group block">
                <div class="aspect-[4/5] bg-[#1a1a1a] rounded-xl overflow-hidden mb-6 relative">
                    <img src="https://images.unsplash.com/photo-1596433809252-260c27459eb5?q=80&w=800&auto=format&fit=crop" alt="Leśna Kąpiel" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000 opacity-90 group-hover:opacity-100">
                </div>
                <div class="text-center">
                    <h3 class="font-serif text-2xl mb-2">Leśna Kąpiel</h3>
                    <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-4">Świerk / Mech / Wilgotna ziemia</p>
                    <p class="text-sm font-light">120 PLN</p>
                </div>
            </a>

            <a href="#" class="group block">
                <div class="aspect-[4/5] bg-[#1a1a1a] rounded-xl overflow-hidden mb-6 relative">
                    <img src="https://images.unsplash.com/photo-1608181114410-db21b214bdf4?q=80&w=800&auto=format&fit=crop" alt="Coffee Addict" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000 opacity-90 group-hover:opacity-100">
                </div>
                <div class="text-center">
                    <h3 class="font-serif text-2xl mb-2">Coffee Addict</h3>
                    <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-4">Palona kawa / Wanilia / Karmel</p>
                    <p class="text-sm font-light">120 PLN</p>
                </div>
            </a>

            <a href="#" class="group block">
                <div class="aspect-[4/5] bg-[#1a1a1a] rounded-xl overflow-hidden mb-6 relative">
                    <img src="https://images.unsplash.com/photo-1602921092645-b74a161f365d?q=80&w=800&auto=format&fit=crop" alt="Leśna Chatka" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000 opacity-90 group-hover:opacity-100">
                </div>
                <div class="text-center">
                    <h3 class="font-serif text-2xl mb-2">Leśna Chatka</h3>
                    <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-4">Ognisko / Żywica / Paczula</p>
                    <p class="text-sm font-light">120 PLN</p>
                </div>
            </a>

        </div>
    </main>
</body>
</html>
