<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NORIEN | Olfactory Cartography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf7; color: #1a1a1a; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bg-dots { background-image: radial-gradient(#d1d1d1 0.8px, transparent 0.8px); background-size: 32px 32px; }

        /* Mapa - Tło (Dzielnice pasywne) */
        .district-bg { fill: transparent; stroke: #e8e8e8; stroke-width: 0.8; transition: all 0.5s ease; }
        .label-bg { font-size: 6px; fill: #1a1a1a; opacity: 0.2; pointer-events: none; text-anchor: middle; letter-spacing: 0.1em; }

        /* Aktywne Dzielnice - WYRAŹNE KOLOROWE GRANICE (BOLD) */
        .active-path { 
            fill: transparent; 
            stroke-width: 2.2; /* Pogrubiona granica */
            cursor: pointer; 
            transition: all 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            transform-origin: center;
            transform-box: fill-box;
        }

        /* Kolory granic dla konkretnych dzielnic */
        .path-mitte { stroke: #b35a2d; }
        .path-prenzl { stroke: #8a7b8e; }
        .path-kreuz { stroke: #005f63; }
        .path-neukolln { stroke: #631b2b; }

        /* HOVER - Efekt z Twojego kodu: uniesienie i lekkie wypełnienie */
        .active-group:hover .active-path {
            transform: translateY(-12px);
            filter: drop-shadow(0 15px 12px rgba(0,0,0,0.1));
            stroke-width: 3; /* Jeszcze mocniejszy bold na hoverze */
        }

        /* Delikatne nasycenie kolorem przy najechaniu (10% opacity) */
        .active-group[onclick*="mitte"]:hover .active-path { fill: rgba(179, 90, 45, 0.1); }
        .active-group[onclick*="prenzl"]:hover .active-path { fill: rgba(138, 123, 142, 0.1); }
        .active-group[onclick*="kreuz"]:hover .active-path { fill: rgba(0, 95, 99, 0.1); }
        .active-group[onclick*="neukolln"]:hover .active-path { fill: rgba(99, 27, 43, 0.1); }

        .label-active { 
            font-size: 7px; font-weight: 600; letter-spacing: 0.2em; opacity: 0.8; 
            transition: all 0.5s ease; text-anchor: middle; 
        }
        .active-group:hover .label-active { opacity: 1; transform: translateY(-12px); }

        /* Popup / Kafelek */
        #product-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 100; transition: all 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        #product-popup.visible { display: block; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(252, 250, 247, 0.85); backdrop-filter: blur(5px); z-index: 90; }
        .overlay.visible { display: block; }
    </style>
</head>
<body class="bg-dots">

    <nav class="p-10 flex justify-between items-center fixed w-full z-50">
        <div class="text-xl tracking-[0.5em] uppercase font-light">Norien <br><span class="text-[9px] tracking-[0.3em] opacity-50">Berlin</span></div>
        <div class="text-[10px] tracking-widest uppercase border-b border-black pb-1">Koszyk (0)</div>
    </nav>

    <main class="min-h-screen flex items-center justify-center pt-20">
        <div class="container mx-auto px-6 grid lg:grid-cols-12 gap-12 items-center">
            
            <!-- MAPA SVG (12 Dzielnic) -->
            <div class="lg:col-span-8 relative">
                <svg viewBox="0 0 1000 850" class="w-full h-auto overflow-visible">
                    
                    <!-- PASYWNE (Tło miasta) -->
                    <path class="district-bg" d="M250,120 L450,100 L500,200 L450,320 L300,320 L250,220 Z" /> <text x="360" y="210" class="label-bg">Reinickendorf</text>
                    <path class="district-bg" d="M450,100 L620,130 L680,250 L640,350 L450,320 Z" /> <text x="560" y="220" class="label-bg">Pankow</text>
                    <path class="district-bg" d="M50,350 L180,280 L280,320 L260,520 L120,600 L40,480 Z" /> <text x="130" y="450" class="label-bg">Spandau</text>
                    <path class="district-bg" d="M260,520 L350,450 L320,320 L280,320 L180,280 L260,520 Z" /> <text x="250" y="410" class="label-bg">Charl.-Wilm.</text>
                    <path class="district-bg" d="M120,600 L260,520 L320,750 L280,850 L100,800 Z" /> <text x="190" y="720" class="label-bg">Steglitz-Zehl.</text>
                    <path class="district-bg" d="M350,450 L430,480 L460,550 L430,650 L450,800 L320,750 L260,520 Z" /> <text x="360" y="620" class="label-bg">Temp.-Schön.</text>
                    <path class="district-bg" d="M640,350 L750,320 L820,450 L650,550 L600,450 Z" /> <text x="710" y="410" class="label-bg">Lichtenberg</text>
                    <path class="district-bg" d="M650,550 L820,450 L950,550 L900,800 L620,650 L550,580 Z" /> <text x="780" y="650" class="label-bg">Treptow-Köp.</text>

                    <!-- AKTYWNE (BOLD GRANICE) -->
                    <!-- MITTE -->
                    <g class="active-group" onclick="showPopup('mitte')">
                        <path class="active-path path-mitte" d="M300,320 L450,320 L480,420 L430,450 L350,420 Z" />
                        <text x="395" y="405" class="label-active !fill-[#b35a2d]">MITTE</text>
                    </g>
                    <!-- PRENZLAUER BERG -->
                    <g class="active-group" onclick="showPopup('prenzl')">
                        <path class="active-path path-prenzl" d="M450,320 L640,350 L600,450 L480,420 Z" />
                        <text x="545" y="395" class="label-active !fill-[#8a7b8e]">PRENZL. BERG</text>
                    </g>
                    <!-- KREUZBERG -->
                    <g class="active-group" onclick="showPopup('kreuz')">
                        <path class="active-path path-kreuz" d="M430,480 L480,420 L600,450 L650,550 L550,580 L460,550 Z" />
                        <text x="530" y="515" class="label-active !fill-[#005f63]">KREUZBERG</text>
                    </g>
                    <!-- NEUKÖLLN -->
                    <g class="active-group" onclick="showPopup('neukolln')">
                        <path class="active-path path-neukolln" d="M460,550 L550,580 L620,650 L580,850 L450,800 L430,650 Z" />
                        <text x="530" y="710" class="label-active !fill-[#631b2b]">NEUKÖLLN</text>
                    </g>
                </svg>
            </div>

            <!-- TREŚĆ BOCZNA -->
            <div class="lg:col-span-4 space-y-10 pl-6">
                <h1 class="text-6xl font-thin tracking-tighter leading-none">Olfactory <br><span class="italic">Cartography.</span></h1>
                <p class="text-sm font-light text-gray-500 leading-relaxed">
                    Berlin skatalogowany w formie esencji. Każda dzielnica to zestaw unikalnych nut, przypisanych do konkretnych granic topograficznych.
                </p>
                <div class="flex gap-12 pt-8 border-t border-gray-100">
                    <div><span class="block text-3xl font-extralight">12</span><span class="text-[9px] uppercase tracking-widest opacity-40">Bezirke</span></div>
                    <div><span class="block text-3xl font-extralight">04</span><span class="text-[9px] uppercase tracking-widest opacity-40">Archives</span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- POPUP -->
    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div id="product-popup" class="w-[380px] bg-white shadow-2xl border border-gray-100">
        <div id="popup-header" class="h-56 flex items-center justify-center text-white p-10 text-center transition-colors duration-500">
            <h3 id="popup-title" class="text-3xl font-light tracking-[0.2em] uppercase"></h3>
        </div>
        <div class="p-10 space-y-6">
            <p id="popup-desc" class="text-sm font-light leading-relaxed text-gray-500"></p>
            <div class="flex justify-between items-center pt-6 border-t border-gray-100">
                <span class="text-2xl font-light">45.00 EUR</span>
                <button class="bg-black text-white text-[10px] px-8 py-4 tracking-[0.2em] uppercase hover:bg-gray-800 transition">Add to Archive</button>
            </div>
        </div>
    </div>

    <script>
        const products = {
            mitte: { title: '01 Mitte', color: '#b35a2d', desc: 'Lawenda, mirra, zamsz. Serce Berlina, gdzie tradycja spotyka nowoczesność.' },
            prenzl: { title: '02 Prenzlauer Berg', color: '#8a7b8e', desc: 'Cytryna, jaśmin, sandałowiec. Spokój poranka na Kollwitzplatz.' },
            kreuz: { title: '03 Kreuzberg', color: '#005f63', desc: 'Bergamotka, paczula, wetiweria. Surowa energia ulicy i rytm nocy[cite: 1].' },
            neukolln: { title: '36 Neukölln', color: '#631b2b', desc: 'Kardamon, mirt, bursztyn. Wielokulturowe serce, które nigdy nie zasypia[cite: 1].' }
        };

        function showPopup(id) {
            const p = products[id];
            document.getElementById('popup-title').innerText = p.title;
            document.getElementById('popup-desc').innerText = p.desc;
            document.getElementById('popup-header').style.backgroundColor = p.color;
            document.getElementById('product-popup').classList.add('visible');
            document.getElementById('overlay').classList.add('visible');
        }

        function closePopup() {
            document.getElementById('product-popup').classList.remove('visible');
            document.getElementById('overlay').classList.remove('visible');
        }
    </script>
</body>
</html>
