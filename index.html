<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Norien Berlin</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background:#f8f7f4;
  color:#111;
}

/* HEADER */

header {
  position:fixed;
  top:40px;
  left:60px;
  font-size:12px;
  letter-spacing:0.4em;
  z-index:10;
}

.cart {
  position:fixed;
  top:40px;
  right:60px;
  font-size:11px;
  letter-spacing:0.2em;
  opacity:0.6;
}

/* HERO */

.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-inner {
  width:90%;
  max-width:1200px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:120px;
}

.hero img { width:100%; }

.hero-text {
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.hero-text h1 {
  font-size:64px;
  font-weight:300;
}

.hero-text p {
  margin-top:20px;
  font-size:12px;
  letter-spacing:0.2em;
  opacity:0.5;
}

/* DISTRICT */

.district {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.district-inner {
  width:90%;
  max-width:1200px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:120px;
}

.district:nth-child(even) .district-inner {
  direction:rtl;
}

.district img { width:100%; }

.district-text {
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.district-text h2 {
  font-size:48px;
  font-weight:300;
}

.district-text span {
  margin-top:10px;
  font-size:11px;
  letter-spacing:0.3em;
  opacity:0.5;
}

/* BUY */

.buy {
  margin-top:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.price {
  font-size:14px;
}

.buy button {
  background:none;
  border:none;
  border-bottom:1px solid #111;
  font-size:11px;
  letter-spacing:0.3em;
  cursor:pointer;
  opacity:0.6;
}

.buy button:hover {
  opacity:1;
}

</style>
</head>

<body>

<header>NORIEN</header>
<div class="cart">CART (0)</div>

<section class="hero">
  <div class="hero-inner">
    <img src="https://images.unsplash.com/photo-1603006905393-c2a9d68a6d9b?q=80&w=1200">
    <div class="hero-text">
      <h1>Charlottenburg</h1>
      <p>soft geometry · late afternoon · stillness</p>
    </div>
  </div>
</section>

<section class="district">
  <div class="district-inner">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200">
    <div class="district-text">
      <h2>Mitte</h2>
      <span>palo santo · cedar · silence</span>

      <div class="buy">
        <div class="price">€55</div>
        <button>Add to archive</button>
      </div>
    </div>
  </div>
</section>

<section class="district">
  <div class="district-inner">
    <img src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e?q=80&w=1200">
    <div class="district-text">
      <h2>Kreuzberg</h2>
      <span>smoke · leather · tension</span>

      <div class="buy">
        <div class="price">€55</div>
        <button>Add to archive</button>
      </div>
    </div>
  </div>
</section>

<section class="district">
  <div class="district-inner">
    <img src="https://images.unsplash.com/photo-1600585154203-8d5bbbf5b8c5?q=80&w=1200">
    <div class="district-text">
      <h2>Neukölln</h2>
      <span>night air · resin · raw</span>

      <div class="buy">
        <div class="price">€55</div>
        <button>Add to archive</button>
      </div>
    </div>
  </div>
</section>

</body>
</html>
